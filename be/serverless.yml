service: lunagenz-backend

provider:
  name: aws
  runtime: nodejs20.x

functions:
  api:
    handler: server.handler
    events:
      - httpApi:
          path: '/{proxy+}'
          method: '*'

plugins:
  - serverless-localstack

custom:
  localstack:
    stages:
      - local
    host: http://localhost
    edgePort: 4566
